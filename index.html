<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>APS Dashboard | Parâmetros Oficiais MS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
    <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
        <div class="logo-text">
            <h1>Saúde<span style="color:#3498DB">APS</span></h1>
            <p id="municipioNome">Carregando...</p>
        </div>
    </div>
    <div class="nav-menu">
        <a class="active" data-section="ranking">🏆 Ranking Geral</a>
        <a data-section="aps">📊 Indicadores APS (C1-C7)</a>
        <a data-section="sb">🦷 Saúde Bucal (B1-B6)</a>
        <a data-section="emulti">👥 eMulti (M1-M2)</a>
    </div>
    <div class="periodo-badge">2º QUADRIMESTRE 2026</div>
</div>

<div class="main-container">
    <div class="hero-banner" id="heroBanner">
        <div>
            <div class="hero-title" id="heroTitle"><i class="fas fa-trophy"></i> Ranking de Desempenho</div>
            <div class="hero-sub" id="heroSub">2º Quadrimestre 2026 | Parâmetros oficiais do Ministério da Saúde</div>
        </div>
        <div class="hero-stats" id="heroStats"></div>
    </div>

    <div id="dynamicContent"></div>

    <div class="footer-buttons">
        <button class="btn" id="btnExcel"><i class="fas fa-file-excel"></i> Exportar Excel</button>
        <button class="btn btn-primary" id="btnPDF"><i class="fas fa-file-pdf"></i> Gerar PDF</button>
    </div>
</div>

<script src="dados.js"></script>
<script src="script.js"></script>
</body>
</html>
